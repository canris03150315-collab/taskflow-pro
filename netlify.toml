# 禁用自動構建，使用手動部署
[build]
  publish = "dist"

# 靜態資源緩存設定
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML 文件不緩存
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# API 反向代理
[[redirects]]
  from = "/api/*"
  to = "http://165.227.147.40:3001/api/:splat"
  status = 200
  force = true
  headers = {X-From = "Netlify"}

# WebSocket 代理
[[redirects]]
  from = "/ws"
  to = "ws://165.227.147.40:3000/ws"
  status = 200
  force = true

# SPA fallback - 只對非靜態資源路徑生效
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
