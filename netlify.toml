[build]
  command = "echo build skipped"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[redirects]]
  from = "/api/*"
  to = "https://feeling-david-action-carry.trycloudflare.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ws"
  to = "wss://feeling-david-action-carry.trycloudflare.com/ws"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200